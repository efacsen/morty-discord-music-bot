version: '3.8'
services:
  bot:
    build: .
    container_name: discord-music-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - discord-player-cache:/app/.discord-player
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  discord-player-cache:
